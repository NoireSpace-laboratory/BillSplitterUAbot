<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F5F5F7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>РозділиЧек 🧾</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧾</text></svg>">

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <script src="https://cdn.tailwindcss.com"></script>
  <style type="text/tailwindcss">
    @layer utilities {
      /* iOS safe area — відступ від нижньої "чьолки" */
      .pb-safe {
        padding-bottom: max(24px, env(safe-area-inset-bottom));
      }
    }
  </style>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body { margin: 0; background: #F5F5F7; -webkit-font-smoothing: antialiased; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }
  </style>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // ══════════════════════════════════════════════════════════
    // SVG ІКОНКИ (замість пакету lucide-react)
    // ══════════════════════════════════════════════════════════
    const Icon = ({ d, size = 24, className = '', strokeWidth = 2, fill = 'none', children }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill={fill}
        stroke="currentColor" strokeWidth={strokeWidth}
        strokeLinecap="round" strokeLinejoin="round" className={className}>
        {d && <path d={d} />}
        {children}
      </svg>
    );

    const Plus = p => <Icon {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>;
    const Copy = p => <Icon {...p}><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></Icon>;
    const Check = p => <Icon {...p} d="M20 6 9 17l-5-5"/>;
    const ChevronLeft = p => <Icon {...p} d="m15 18-6-6 6-6"/>;
    const Trash2 = p => (
      <Icon {...p}>
        <polyline points="3,6 5,6 21,6"/>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        <line x1="10" y1="11" x2="10" y2="17"/>
        <line x1="14" y1="11" x2="14" y2="17"/>
      </Icon>
    );
    const Users = p => (
      <Icon {...p}>
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </Icon>
    );
    const Receipt = p => (
      <Icon {...p}>
        <polyline points="6,1 1,6 6,11"/>
        <path d="M21 12H1"/>
        <rect x="3" y="14" width="18" height="8" rx="1"/>
      </Icon>
    );
    const CreditCard = p => (
      <Icon {...p}>
        <rect width="22" height="16" x="1" y="4" rx="2"/>
        <line x1="1" y1="10" x2="23" y2="10"/>
      </Icon>
    );
    const MessageSquareText = p => (
      <Icon {...p}>
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        <path d="M13 8H7"/><path d="M17 12H7"/>
      </Icon>
    );
    const Camera = p => (
      <Icon {...p}>
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </Icon>
    );
    const Loader2 = p => <Icon {...p} d="M21 12a9 9 0 1 1-6.219-8.56"/>;
    const LinkIcon = p => (
      <Icon {...p}>
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </Icon>
    );

    // ══════════════════════════════════════════════════════════
    // ПЕРЕКЛАДИ
    // ══════════════════════════════════════════════════════════
    const translations = {
      uk: {
        me: 'Я', defaultPurpose: 'Поповнення рахунку', billTitleDefault: 'Рахунок',
        newBillTitle: 'Новий рахунок', totalToPay: 'До сплати',
        unnamedItem: 'Позиція без назви', sharedWith1: 'Спільна з',
        sharedWith2Person: 'людиною', sharedWith2People: 'людьми', total: 'заг.',
        payment: 'Оплата', paymentLink: 'Оплата за посиланням', cardNumber: 'Номер картки',
        ibanAccount: 'IBAN рахунок', ibanAccountFull: 'IBAN (з ІПН та отримувачем)',
        recipient: 'Отримувач', recipientFull: 'Отримувач (ПІБ або ФОП)',
        ipn: 'ІПН', ipnFull: 'ІПН / ЄДРПОУ', paymentPurpose: 'Призначення платежу',
        edit: 'Редагувати', copied: 'Скопійовано', link: 'Посилання',
        textCopied: 'Скопійовано!', textForMessenger: 'Текст для месенджера',
        place: 'Заклад', placePlaceholder: 'Назва закладу...',
        participants: 'Учасники', friendNamePlaceholder: "Ім'я друга...", add: 'Додати',
        items: 'Позиції', whatOrderedPlaceholder: 'Що замовляли?',
        whoShares: 'Хто ділить цю позицію?', notSelected: 'Не обрано',
        delete: 'Видалити', analyzing: 'Аналізуємо...', scanReceipt: 'Скан чеку',
        manual: 'Вручну', paymentMethods: 'Прийом оплати', generateBill: 'Сформувати рахунок',
        aiPrompt: 'Витягни всі замовлені позиції з цього чеку. Ігноруй суму, знижки, чайові, податки. Поверни тільки страви/товари.',
        aiErrorParse: 'Не вдалося розпізнати позиції. Зробіть чіткіше фото.',
        aiErrorFetch: 'Помилка обробки чеку. Спробуйте ще раз.',
        aiErrorFile: 'Помилка читання файлу.',
        textReportBill: '🧾 Рахунок', textReportTotal: '💰 Загальна сума',
        textReportDetails: '💳 Реквізити', textReportLink: '🔗 Посилання для оплати',
        textReportCard: '💳 Картка', textReportIban: '🏦 IBAN',
        textReportRecipient: '👤 Отримувач', textReportIpn: '🆔 ІПН/ЄДРПОУ',
        textReportPurpose: '📝 Призначення', currency: '₴'
      },
      en: {
        me: 'Me', defaultPurpose: 'Account top-up', billTitleDefault: 'Bill',
        newBillTitle: 'New Bill', totalToPay: 'Total to pay',
        unnamedItem: 'Unnamed item', sharedWith1: 'Shared with',
        sharedWith2Person: 'person', sharedWith2People: 'people', total: 'total',
        payment: 'Payment', paymentLink: 'Payment link', cardNumber: 'Card number',
        ibanAccount: 'IBAN', ibanAccountFull: 'IBAN (with TIN and recipient)',
        recipient: 'Recipient', recipientFull: 'Recipient (Full name / Company)',
        ipn: 'TIN', ipnFull: 'TIN / EDRPOU', paymentPurpose: 'Payment purpose',
        edit: 'Edit', copied: 'Copied', link: 'Link',
        textCopied: 'Copied!', textForMessenger: 'Text for messenger',
        place: 'Place', placePlaceholder: 'Restaurant name...',
        participants: 'Participants', friendNamePlaceholder: "Friend's name...", add: 'Add',
        items: 'Items', whatOrderedPlaceholder: 'What was ordered?',
        whoShares: 'Who shares this item?', notSelected: 'Not selected',
        delete: 'Delete', analyzing: 'Analyzing...', scanReceipt: 'Scan receipt',
        manual: 'Manual', paymentMethods: 'Payment methods', generateBill: 'Generate bill',
        aiPrompt: 'Extract all ordered items from this receipt. Ignore total, discounts, tips, taxes. Return only food/goods.',
        aiErrorParse: 'Could not read items. Try a clearer photo.',
        aiErrorFetch: 'Receipt processing error. Try again.',
        aiErrorFile: 'File reading error.',
        textReportBill: '🧾 Bill', textReportTotal: '💰 Total',
        textReportDetails: '💳 Payment details', textReportLink: '🔗 Payment link',
        textReportCard: '💳 Card', textReportIban: '🏦 IBAN',
        textReportRecipient: '👤 Recipient', textReportIpn: '🆔 TIN/EDRPOU',
        textReportPurpose: '📝 Purpose', currency: '₴'
      }
    };

    // ══════════════════════════════════════════════════════════
    // УТИЛІТИ
    // ══════════════════════════════════════════════════════════
    const fetchWithRetry = async (url, options, retries = 4) => {
      const delays = [1000, 2000, 4000, 8000];
      for (let i = 0; i < retries; i++) {
        try {
          const res = await fetch(url, options);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return res.json();
        } catch (e) {
          if (i === retries - 1) throw e;
          await new Promise(r => setTimeout(r, delays[i]));
        }
      }
    };

    const encodeState = s => {
      try { return btoa(encodeURIComponent(JSON.stringify(s))); }
      catch { return ''; }
    };

    const decodeState = h => {
      try { return JSON.parse(decodeURIComponent(atob(h.replace('#', '')))); }
      catch { return null; }
    };

    const copyText = async text => {
      try { await navigator.clipboard.writeText(text); }
      catch {
        const ta = Object.assign(document.createElement('textarea'), {
          value: text, style: 'position:fixed;opacity:0'
        });
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
      }
    };

    // ══════════════════════════════════════════════════════════
    // ГОЛОВНИЙ КОМПОНЕНТ
    // ══════════════════════════════════════════════════════════
    function App() {
      const lang = useMemo(() => {
        const l = (navigator.language || '').substring(0, 2).toLowerCase();
        return l === 'uk' || l === 'ru' ? 'uk' : 'en';
      }, []);
      const t = k => translations[lang][k] ?? k;

      const [isLoaded, setIsLoaded]     = useState(false);
      const [appMode, setAppMode]       = useState('edit');
      const [isReadOnly, setIsReadOnly] = useState(false);

      const [restaurantName, setRestaurantName] = useState('');
      const [people, setPeople]         = useState(() => [{ id: 'p1', name: t('me') }]);
      const [items, setItems]           = useState([]);
      const [paymentConfig, setPaymentConfig] = useState(() => ({
        useLink: false, linkUrl: '',
        useCard: false, cardNumber: '',
        useIban: false, iban: '', recipient: '', ipn: '', purpose: t('defaultPurpose')
      }));

      const [newPersonName, setNewPersonName]   = useState('');
      const [copiedField, setCopiedField]       = useState(null);
      const [copiedReport, setCopiedReport]     = useState(false);
      const [copiedLink, setCopiedLink]         = useState(false);
      const [isScanning, setIsScanning]         = useState(false);
      const [scanError, setScanError]           = useState(null);
      const fileInputRef = useRef(null);

      // Ініціалізація з URL
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        if (params.get('view') === 'true') { setIsReadOnly(true); setAppMode('view'); }
        const saved = decodeState(window.location.hash);
        if (saved) {
          if (saved.restaurantName) setRestaurantName(saved.restaurantName);
          if (saved.people)         setPeople(saved.people);
          if (saved.items)          setItems(saved.items);
          if (saved.paymentConfig)  setPaymentConfig(saved.paymentConfig);
        }
        setIsLoaded(true);

        // Ініціалізація Telegram WebApp
        if (window.Telegram?.WebApp) {
          window.Telegram.WebApp.ready();
          window.Telegram.WebApp.expand();
        }
      }, []);

      // Зберігаємо стан у хеш
      useEffect(() => {
        if (!isLoaded || isReadOnly) return;
        const enc = encodeState({ restaurantName, people, items, paymentConfig });
        if (enc) window.history.replaceState(null, '', `#${enc}`);
      }, [restaurantName, people, items, paymentConfig, isLoaded, isReadOnly]);

      // Підрахунок
      const totals = useMemo(() => {
        let grandTotal = 0;
        const personTotals = {};
        people.forEach(p => { personTotals[p.id] = 0; });
        items.forEach(item => {
          const price = parseFloat(item.price) || 0;
          grandTotal += price;
          const n = item.sharedBy.length;
          if (n > 0) item.sharedBy.forEach(pid => {
            if (personTotals[pid] !== undefined) personTotals[pid] += price / n;
          });
        });
        return { grandTotal, personTotals };
      }, [items, people]);

      // Учасники
      const addPerson = () => {
        if (!newPersonName.trim()) return;
        setPeople(p => [...p, { id: `p${Date.now()}`, name: newPersonName.trim() }]);
        setNewPersonName('');
      };
      const removePerson = id => {
        setPeople(p => p.filter(x => x.id !== id));
        setItems(its => its.map(item => ({ ...item, sharedBy: item.sharedBy.filter(pid => pid !== id) })));
      };

      // Позиції
      const addItem = () => setItems(its => [...its, {
        id: `i${Date.now()}`, name: '', price: '', sharedBy: people.map(p => p.id)
      }]);
      const updateItem = (id, field, val) =>
        setItems(its => its.map(item => item.id === id ? { ...item, [field]: val } : item));
      const removeItem = id => setItems(its => its.filter(item => item.id !== id));
      const toggleShare = (itemId, personId) => setItems(its => its.map(item => {
        if (item.id !== itemId) return item;
        const has = item.sharedBy.includes(personId);
        return { ...item, sharedBy: has ? item.sharedBy.filter(id => id !== personId) : [...item.sharedBy, personId] };
      }));

      const updatePay = (field, val) => setPaymentConfig(p => ({ ...p, [field]: val }));

      // Копіювання поля
      const handleCopy = async (text, field) => {
        await copyText(text);
        setCopiedField(field);
        setTimeout(() => setCopiedField(null), 2000);
      };

      // Посилання для шерінгу
      const handleShareUrl = async () => {
        const url = new URL(window.location.href);
        url.searchParams.set('view', 'true');
        await copyText(url.toString());
        setCopiedLink(true);
        setTimeout(() => setCopiedLink(false), 2000);
      };

      // Скан чеку (через Worker)
      const handleImageUpload = async e => {
        const file = e.target.files?.[0];
        if (!file) return;

        setIsScanning(true);
        setScanError(null);
        try {
          const base64 = await new Promise((res, rej) => {
            const r = new FileReader();
            r.onload = () => res(r.result.split(',')[1]);
            r.onerror = () => rej(new Error(t('aiErrorFile')));
            r.readAsDataURL(file);
          });

          const result = await fetchWithRetry(
           'https://gemini-proxy-theta-brown.vercel.app',
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ role: 'user', parts: [
                  { text: t('aiPrompt') },
                  { inlineData: { mimeType: file.type, data: base64 } }
                ]}],
                // Зберігаємо generationConfig, щоб воркер міг коректно передати вимогу до формату
                generationConfig: {
                  responseMimeType: 'application/json',
                  responseSchema: { type: 'ARRAY', items: { type: 'OBJECT',
                    properties: { name: { type: 'STRING' }, price: { type: 'NUMBER' } }
                  }}
                }
              })
            }
          );

          const text = result?.candidates?.[0]?.content?.parts?.[0]?.text;
          if (!text) { setScanError(t('aiErrorParse')); return; }

          const parsed = JSON.parse(text);
          setItems(its => [...its, ...parsed.map(item => ({
            id: `i${Date.now()}${Math.random().toString(36).slice(2, 8)}`,
            name: item.name ?? '', price: String(item.price ?? ''),
            sharedBy: people.map(p => p.id)
          }))]);
        } catch (err) {
          setScanError(err.message === t('aiErrorFile') ? t('aiErrorFile') : t('aiErrorFetch'));
        } finally {
          setIsScanning(false);
          if (fileInputRef.current) fileInputRef.current.value = '';
        }
      };

      // Текстовий звіт
      const makeReport = () => {
        let txt = `${t('textReportBill')}: ${restaurantName || t('billTitleDefault')}\n`;
        txt += `${t('textReportTotal')}: ${totals.grandTotal.toFixed(2)} ${t('currency')}\n──────────────\n\n`;
        people.forEach(person => {
          const pItems = items.filter(item => item.sharedBy.includes(person.id));
          const pTotal = totals.personTotals[person.id] || 0;
          if (!pTotal) return;
          txt += `👤 ${person.name}: ${pTotal.toFixed(2)} ${t('currency')}\n`;
          pItems.forEach(item => {
            const share = parseFloat(item.price) / item.sharedBy.length;
            txt += `  ▫️ ${item.name || t('unnamedItem')} — ${share.toFixed(2)} ${t('currency')}\n`;
          });
          txt += '\n';
        });
        const { useLink, linkUrl, useCard, cardNumber, useIban, iban, recipient, ipn, purpose } = paymentConfig;
        if (useLink || useCard || useIban) {
          txt += `──────────────\n${t('textReportDetails')}:\n\n`;
          if (useLink && linkUrl) txt += `${t('textReportLink')}:\n${linkUrl}\n\n`;
          if (useCard && cardNumber) txt += `${t('textReportCard')}: ${cardNumber}\n\n`;
          if (useIban) {
            txt += `${t('textReportIban')}: ${iban}\n${t('textReportRecipient')}: ${recipient}\n`;
            txt += `${t('textReportIpn')}: ${ipn}\n${t('textReportPurpose')}: ${purpose}\n`;
          }
        }
        return txt;
      };

      const handleCopyReport = async () => {
        await copyText(makeReport());
        setCopiedReport(true);
        setTimeout(() => setCopiedReport(false), 2000);
      };

      const hasPayment = (paymentConfig.useLink && paymentConfig.linkUrl) ||
                         (paymentConfig.useCard && paymentConfig.cardNumber) ||
                         paymentConfig.useIban;

      if (!isLoaded) return null;

      // ────────────────── VIEW MODE ──────────────────
      if (appMode === 'view') return (
        <div className="min-h-screen bg-[#F5F5F7] text-[#1D1D1F] font-sans pb-32">
          <div className="max-w-lg mx-auto p-4 sm:p-6 space-y-6">

            {!isReadOnly && (
              <button onClick={() => setAppMode('edit')}
                className="flex items-center gap-1 text-[#0071E3] font-medium text-[17px] mt-4 mb-2 hover:opacity-80 transition-opacity">
                <ChevronLeft size={20} /> {t('edit')}
              </button>
            )}

            <div className="text-center pt-4 pb-2">
              <h1 className="text-[32px] font-bold tracking-tight">{restaurantName || t('billTitleDefault')}</h1>
              <p className="text-[#86868b] text-[17px] mt-1">{t('totalToPay')}: {totals.grandTotal.toFixed(2)} {t('currency')}</p>
            </div>

            <div className="space-y-4">
              {people.map(person => {
                const pItems = items.filter(item => item.sharedBy.includes(person.id));
                const pTotal = totals.personTotals[person.id] || 0;
                if (!pTotal && !pItems.length) return null;
                return (
                  <div key={person.id} className="bg-white rounded-3xl shadow-[0_2px_20px_rgba(0,0,0,0.04)] overflow-hidden">
                    <div className="px-6 py-4 border-b border-gray-100 bg-gray-50/50 flex justify-between items-center">
                      <div className="flex items-center gap-3">
                        <div className="w-8 h-8 rounded-full bg-[#E8E8ED] flex items-center justify-center text-[#1D1D1F] font-bold text-[14px]">
                          {person.name.charAt(0).toUpperCase()}
                        </div>
                        <h2 className="text-[17px] font-semibold">{person.name}</h2>
                      </div>
                      <span className="text-[19px] font-bold">
                        {pTotal.toFixed(2)} <span className="text-[#86868b] text-[15px] font-medium">{t('currency')}</span>
                      </span>
                    </div>
                    <div className="divide-y divide-gray-100">
                      {pItems.map(item => {
                        const share = parseFloat(item.price) / item.sharedBy.length;
                        const cnt = item.sharedBy.length - 1;
                        return (
                          <div key={item.id} className="px-6 py-3.5 flex justify-between items-center">
                            <div className="flex flex-col pr-4">
                              <span className="text-[15px] font-medium">{item.name || t('unnamedItem')}</span>
                              {item.sharedBy.length > 1 && (
                                <span className="text-[13px] text-[#86868b] mt-0.5">
                                  {t('sharedWith1')} {cnt} {cnt === 1 ? t('sharedWith2Person') : t('sharedWith2People')} ({t('total')} {item.price} {t('currency')})
                                </span>
                              )}
                            </div>
                            <span className="text-[16px] font-medium text-[#86868b] whitespace-nowrap">
                              {share.toFixed(2)} {t('currency')}
                            </span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>

            {hasPayment && (
              <div className="bg-white rounded-3xl shadow-[0_2px_20px_rgba(0,0,0,0.04)] overflow-hidden">
                <div className="px-6 py-4 border-b border-gray-100 bg-gray-50/50 flex items-center gap-2">
                  <CreditCard size={16} className="text-[#86868b]" />
                  <h2 className="text-[13px] font-semibold text-[#86868b] uppercase tracking-wider">{t('payment')}</h2>
                </div>
                <div className="p-6 space-y-4">
                  {paymentConfig.useLink && paymentConfig.linkUrl && (
                    <div className="bg-[#F5F5F7] p-4 rounded-2xl">
                      <p className="text-[12px] font-medium text-[#86868b] uppercase tracking-wide mb-1">{t('paymentLink')}</p>
                      <a href={paymentConfig.linkUrl.startsWith('http') ? paymentConfig.linkUrl : `https://${paymentConfig.linkUrl}`}
                        target="_blank" rel="noopener noreferrer"
                        className="text-[#0071E3] text-[15px] font-medium hover:underline break-all">
                        {paymentConfig.linkUrl}
                      </a>
                    </div>
                  )}
                  {paymentConfig.useCard && paymentConfig.cardNumber && (
                    <div className="flex justify-between items-center bg-[#F5F5F7] p-4 rounded-2xl">
                      <div>
                        <p className="text-[12px] font-medium text-[#86868b] uppercase tracking-wide mb-1">{t('cardNumber')}</p>
                        <p className="font-mono text-[15px] font-semibold">{paymentConfig.cardNumber}</p>
                      </div>
                      <button onClick={() => handleCopy(paymentConfig.cardNumber.replace(/\s/g,''), 'card')}
                        className="w-10 h-10 flex items-center justify-center bg-white rounded-full shadow-sm text-[#0071E3]">
                        {copiedField === 'card' ? <Check size={18} className="text-green-500" /> : <Copy size={18} />}
                      </button>
                    </div>
                  )}
                  {paymentConfig.useIban && (
                    <>
                      <div className="flex justify-between items-center bg-[#F5F5F7] p-4 rounded-2xl">
                        <div className="flex-1 overflow-hidden pr-4">
                          <p className="text-[12px] font-medium text-[#86868b] uppercase tracking-wide mb-1">{t('ibanAccount')}</p>
                          <p className="font-mono text-[13px] font-semibold truncate">{paymentConfig.iban}</p>
                        </div>
                        <button onClick={() => handleCopy(paymentConfig.iban, 'iban')}
                          className="w-10 h-10 flex items-center justify-center bg-white rounded-full shadow-sm text-[#0071E3] shrink-0">
                          {copiedField === 'iban' ? <Check size={18} className="text-green-500" /> : <Copy size={18} />}
                        </button>
                      </div>
                      <div className="grid grid-cols-2 gap-3">
                        <div className="bg-[#F5F5F7] p-4 rounded-2xl">
                          <p className="text-[12px] font-medium text-[#86868b] uppercase tracking-wide mb-1">{t('recipient')}</p>
                          <p className="text-[14px] font-medium">{paymentConfig.recipient}</p>
                        </div>
                        <div className="bg-[#F5F5F7] p-4 rounded-2xl">
                          <p className="text-[12px] font-medium text-[#86868b] uppercase tracking-wide mb-1">{t('ipnFull')}</p>
                          <p className="font-mono text-[14px] font-semibold">{paymentConfig.ipn}</p>
                        </div>
                      </div>
                      {paymentConfig.purpose && (
                        <div className="bg-[#F5F5F7] p-4 rounded-2xl">
                          <p className="text-[12px] font-medium text-[#86868b] uppercase tracking-wide mb-1">{t('paymentPurpose')}</p>
                          <p className="text-[14px] font-medium">{paymentConfig.purpose}</p>
                        </div>
                      )}
                    </>
                  )}
                </div>
              </div>
            )}
          </div>

          <div className="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-xl border-t border-gray-200/50 pb-safe">
            <div className="max-w-lg mx-auto flex gap-3">
              <button onClick={handleShareUrl}
                className="flex-1 flex items-center justify-center gap-2 bg-[#F5F5F7] hover:bg-[#E8E8ED] text-[#1D1D1F] text-[15px] font-semibold py-4 rounded-2xl transition-all active:scale-[0.98]">
                {copiedLink ? <Check size={20} /> : <LinkIcon size={20} />}
                {copiedLink ? t('copied') : t('link')}
              </button>
              <button onClick={handleCopyReport}
                className={`flex-[2] flex items-center justify-center gap-2 text-white text-[16px] font-semibold py-4 rounded-2xl transition-all active:scale-[0.98] ${copiedReport ? 'bg-green-500' : 'bg-[#0071E3] hover:bg-[#0077ED]'}`}>
                {copiedReport ? <Check size={20} /> : <MessageSquareText size={20} />}
                {copiedReport ? t('textCopied') : t('textForMessenger')}
              </button>
            </div>
          </div>
        </div>
      );

      // ────────────────── EDIT MODE ──────────────────
      return (
        <div className="min-h-screen bg-[#F5F5F7] text-[#1D1D1F] font-sans pb-32">
          <div className="max-w-lg mx-auto p-4 sm:p-6 space-y-6">

            <div className="pt-4 pb-2">
              <h1 className="text-[34px] font-bold tracking-tight">{t('newBillTitle')}</h1>
            </div>

            {/* Заклад */}
            <div className="bg-white rounded-3xl p-5 shadow-[0_2px_10px_rgba(0,0,0,0.02)]">
              <label className="block text-[13px] font-semibold text-[#86868b] uppercase tracking-wider mb-3">{t('place')}</label>
              <input type="text" value={restaurantName} onChange={e => setRestaurantName(e.target.value)}
                placeholder={t('placePlaceholder')}
                className="w-full bg-[#F5F5F7] text-[17px] px-4 py-3.5 rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#0071E3]/30 placeholder-[#86868b]" />
            </div>

            {/* Учасники */}
            <div className="bg-white rounded-3xl p-5 shadow-[0_2px_10px_rgba(0,0,0,0.02)]">
              <div className="flex items-center gap-2 mb-4">
                <Users size={18} className="text-[#86868b]" />
                <label className="text-[13px] font-semibold text-[#86868b] uppercase tracking-wider">{t('participants')}</label>
              </div>
              <div className="flex flex-wrap gap-2 mb-4">
                {people.map(p => (
                  <div key={p.id} className="flex items-center gap-1.5 bg-[#F5F5F7] pl-3 pr-1 py-1 rounded-full">
                    <span className="text-[15px] font-medium">{p.name}</span>
                    <button onClick={() => removePerson(p.id)} className="p-1.5 text-[#86868b] hover:text-red-500 rounded-full transition-colors">
                      <Trash2 size={14} />
                    </button>
                  </div>
                ))}
              </div>
              <div className="flex gap-2">
                <input type="text" value={newPersonName} onChange={e => setNewPersonName(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && addPerson()} placeholder={t('friendNamePlaceholder')}
                  className="flex-1 bg-[#F5F5F7] text-[17px] px-4 py-3 rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#0071E3]/30 placeholder-[#86868b]" />
                <button onClick={addPerson} className="bg-[#E8E8ED] hover:bg-[#D1D1D6] px-5 py-3 rounded-2xl font-semibold transition-colors active:scale-95">
                  {t('add')}
                </button>
              </div>
            </div>

            {/* Позиції */}
            <div className="bg-white rounded-3xl p-5 shadow-[0_2px_10px_rgba(0,0,0,0.02)]">
              <div className="flex items-center justify-between mb-4">
                <div className="flex items-center gap-2">
                  <Receipt size={18} className="text-[#86868b]" />
                  <label className="text-[13px] font-semibold text-[#86868b] uppercase tracking-wider">{t('items')}</label>
                </div>
                <span className="text-[17px] font-semibold text-[#0071E3]">{totals.grandTotal.toFixed(2)} {t('currency')}</span>
              </div>

              <div className="space-y-4 mb-4">
                {items.map(item => (
                  <div key={item.id} className="p-4 bg-[#F5F5F7] rounded-2xl space-y-4">
                    <div className="flex gap-3">
                      <input type="text" value={item.name} onChange={e => updateItem(item.id, 'name', e.target.value)}
                        placeholder={t('whatOrderedPlaceholder')}
                        className="flex-1 bg-white text-[16px] px-3 py-2.5 rounded-xl focus:outline-none shadow-sm placeholder-[#86868b]" />
                      <div className="relative w-28 shrink-0">
                        <input type="number" min="0" step="0.01" value={item.price}
                          onChange={e => updateItem(item.id, 'price', e.target.value)} placeholder="0.00"
                          className="w-full bg-white text-[16px] px-3 py-2.5 pr-7 rounded-xl focus:outline-none shadow-sm font-medium" />
                        <span className="absolute right-3 top-2.5 text-[#86868b] font-medium">{t('currency')}</span>
                      </div>
                    </div>
                    <div>
                      <p className="text-[12px] font-medium text-[#86868b] mb-2">{t('whoShares')}</p>
                      <div className="flex flex-wrap gap-2">
                        {people.map(person => {
                          const sel = item.sharedBy.includes(person.id);
                          return (
                            <button key={person.id} onClick={() => toggleShare(item.id, person.id)}
                              className={`text-[14px] px-3.5 py-1.5 rounded-full font-medium transition-all active:scale-95 ${sel ? 'bg-[#1D1D1F] text-white shadow-md' : 'bg-white text-[#86868b] border border-gray-200/60'}`}>
                              {person.name}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                    <div className="flex justify-between items-center pt-2 border-t border-gray-200/50">
                      <span className="text-[13px] text-[#86868b] font-medium">
                        {item.sharedBy.length > 0 && item.price
                          ? `${(parseFloat(item.price)/item.sharedBy.length).toFixed(2)} ${t('currency')}`
                          : t('notSelected')}
                      </span>
                      <button onClick={() => removeItem(item.id)} className="flex items-center gap-1 text-[13px] text-red-500 font-medium hover:opacity-80">
                        <Trash2 size={14} /> {t('delete')}
                      </button>
                    </div>
                  </div>
                ))}
              </div>

              {scanError && (
                <div className="mb-4 p-3 bg-red-50 text-red-600 rounded-xl text-sm font-medium border border-red-100 flex items-center justify-between">
                  {scanError}
                  <button onClick={() => setScanError(null)} className="ml-2 text-red-400">×</button>
                </div>
              )}

              <div className="flex gap-3">
                <button onClick={addItem}
                  className="flex-1 py-3.5 bg-[#E8E8ED] hover:bg-[#D1D1D6] rounded-2xl flex items-center justify-center gap-2 font-semibold text-[16px] active:scale-[0.98] transition-colors">
                  <Plus size={18} /> {t('manual')}
                </button>
                <button onClick={() => fileInputRef.current?.click()} disabled={isScanning}
                  className={`flex-1 py-3.5 flex items-center justify-center gap-2 rounded-2xl font-semibold text-[16px] transition-all active:scale-[0.98] ${isScanning ? 'bg-[#0071E3]/60 text-white cursor-not-allowed' : 'bg-[#0071E3] hover:bg-[#0077ED] text-white'}`}>
                  {isScanning ? <Loader2 size={18} className="animate-spin" /> : <Camera size={18} />}
                  {isScanning ? t('analyzing') : t('scanReceipt')}
                </button>
                <input type="file" accept="image/*" ref={fileInputRef} onChange={handleImageUpload} className="hidden" />
              </div>
            </div>

            {/* Оплата */}
            <div className="bg-white rounded-3xl p-5 shadow-[0_2px_10px_rgba(0,0,0,0.02)] space-y-4">
              <div className="flex items-center gap-2 mb-2">
                <CreditCard size={18} className="text-[#86868b]" />
                <label className="text-[13px] font-semibold text-[#86868b] uppercase tracking-wider">{t('paymentMethods')}</label>
              </div>

              {/* Посилання */}
              <div className="space-y-3">
                <button onClick={() => updatePay('useLink', !paymentConfig.useLink)} className="flex items-center gap-3 w-full">
                  <div className={`w-5 h-5 rounded flex items-center justify-center ${paymentConfig.useLink ? 'bg-[#0071E3]' : 'border-2 border-gray-300'}`}>
                    {paymentConfig.useLink && <Check size={14} className="text-white" />}
                  </div>
                  <span className="text-[16px] font-medium">{t('paymentLink')}</span>
                </button>
                {paymentConfig.useLink && (
                  <input type="text" value={paymentConfig.linkUrl} onChange={e => updatePay('linkUrl', e.target.value)}
                    placeholder="https://send.monobank.ua/..."
                    className="w-full bg-[#F5F5F7] text-[15px] px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#0071E3]/30 placeholder-[#86868b]" />
                )}
              </div>

              {/* Картка */}
              <div className="space-y-3 pt-2">
                <button onClick={() => updatePay('useCard', !paymentConfig.useCard)} className="flex items-center gap-3 w-full">
                  <div className={`w-5 h-5 rounded flex items-center justify-center ${paymentConfig.useCard ? 'bg-[#0071E3]' : 'border-2 border-gray-300'}`}>
                    {paymentConfig.useCard && <Check size={14} className="text-white" />}
                  </div>
                  <span className="text-[16px] font-medium">{t('cardNumber')}</span>
                </button>
                {paymentConfig.useCard && (
                  <input type="text" value={paymentConfig.cardNumber} onChange={e => updatePay('cardNumber', e.target.value)}
                    placeholder="XXXX XXXX XXXX XXXX"
                    className="w-full bg-[#F5F5F7] text-[15px] px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#0071E3]/30 font-mono" />
                )}
              </div>

              {/* IBAN */}
              <div className="space-y-3 pt-2">
                <button onClick={() => updatePay('useIban', !paymentConfig.useIban)} className="flex items-center gap-3 w-full">
                  <div className={`w-5 h-5 rounded flex items-center justify-center ${paymentConfig.useIban ? 'bg-[#0071E3]' : 'border-2 border-gray-300'}`}>
                    {paymentConfig.useIban && <Check size={14} className="text-white" />}
                  </div>
                  <span className="text-[16px] font-medium">{t('ibanAccountFull')}</span>
                </button>
                {paymentConfig.useIban && (
                  <div className="space-y-3 bg-[#F5F5F7] p-4 rounded-xl">
                    {[
                      { label: 'IBAN', field: 'iban', ph: 'UA29...', mono: true },
                      { label: t('recipientFull'), field: 'recipient', ph: 'Іванов Іван Іванович', mono: false },
                      { label: t('ipnFull'), field: 'ipn', ph: '1234567890', mono: true },
                      { label: t('paymentPurpose'), field: 'purpose', ph: t('defaultPurpose'), mono: false },
                    ].map(({ label, field, ph, mono }) => (
                      <div key={field}>
                        <label className="block text-[12px] font-medium text-[#86868b] mb-1">{label}</label>
                        <input type="text" value={paymentConfig[field]} onChange={e => updatePay(field, e.target.value)}
                          placeholder={ph}
                          className={`w-full bg-white text-[15px] px-3 py-2.5 rounded-lg focus:outline-none ${mono ? 'font-mono' : ''}`} />
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>

          </div>

          <div className="fixed bottom-0 left-0 right-0 p-4 bg-[#F5F5F7]/80 backdrop-blur-xl border-t border-gray-200/50 pb-safe">
            <div className="max-w-lg mx-auto">
              <button onClick={() => setAppMode('view')}
                className="w-full flex items-center justify-center gap-2 bg-[#1D1D1F] hover:bg-black text-white text-[17px] font-semibold py-4 rounded-2xl transition-all shadow-[0_4px_14px_rgba(0,0,0,0.15)] active:scale-[0.98]">
                {t('generateBill')}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // Старт
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
